# .github/workflows/docker-publish.yml
#
# Publish services/nas-backend/ to Docker Hub as
#   docker.io/sebailla001/alejandria-nas-bockend
#
# Triggers:
#   * push of a tag matching v*   (release: immutable vX.Y.Z tag)
#   * workflow_dispatch            (manual: can pin to vX.Y.Z or to a branch ref)
#
# Tagging rules:
#   * On tag vX.Y.Z, push the same vX.Y.Z.
#   * On main (manual dispatch only — push tags never carry the 'latest'
#     alias), push 'latest'.
#
# Multi-arch: linux/amd64, linux/arm64 (QNAP ARM is a known future target).
#
# Secrets expected on the repo (Settings -> Secrets and variables -> Actions):
#   * DOCKERHUB_USERNAME  — Docker Hub account that owns the repo
#   * DOCKERHUB_TOKEN     — Docker Hub access token (NOT the account password)

name: docker-publish

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      ref:
        description: "Git ref to build (branch, tag, or SHA). Defaults to the workflow run's SHA."
        required: false
        default: ""

permissions:
  contents: read

jobs:
  build-and-push:
    name: build and push (multi-arch)
    runs-on: ubuntu-latest

    steps:
      - name: checkout
        uses: actions/checkout@v4
        with:
          # Fetch full history so VERSION/VCS_REF resolution below is exact.
          fetch-depth: 0

      - name: resolve version
        id: version
        working-directory: services/nas-backend
        run: |
          set -euo pipefail
          # Prefer the pushed tag (vX.Y.Z); strip the leading 'v'.
          if [[ "${GITHUB_REF_TYPE}" == "tag" && "${GITHUB_REF_NAME}" =~ ^v ]]; then
            VERSION="${GITHUB_REF_NAME#v}"
          else
            # Manual dispatch / branch ref — read package.json directly.
            VERSION="$(node -p "require('./package.json').version")"
          fi
          echo "version=${VERSION}" >> "${GITHUB_OUTPUT}"
          echo "Resolved VERSION=${VERSION}"

      - name: set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: compute tags
        id: meta
        run: |
          set -euo pipefail
          VERSION="${{ steps.version.outputs.version }}"
          TAGS="docker.io/sebailla001/alejandria-nas-bockend:v${VERSION}"
          # Push 'latest' ONLY on main-branch builds — release tags stay
          # immutable per-version so we never overwrite an old 'latest'
          # by accident.
          if [[ "${GITHUB_REF_TYPE}" == "branch" && "${GITHUB_REF_NAME}" == "refs/heads/main" ]]; then
            TAGS="${TAGS},docker.io/sebailla001/alejandria-nas-bockend:latest"
          fi
          echo "tags=${TAGS}" >> "${GITHUB_OUTPUT}"
          echo "Resolved tags: ${TAGS}"

      - name: build and push
        uses: docker/build-push-action@v5
        with:
          context: services/nas-backend
          file: services/nas-backend/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          platforms: linux/amd64,linux/arm64
          build-args: |
            VERSION=${{ steps.version.outputs.version }}
            VCS_REF=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false